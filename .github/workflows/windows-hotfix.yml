name: Windows Hotfix Installer

on:
  push:
    branches:
      - build/windows-hotfix-0b50f1c
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-hotfix-${{ github.ref }}
  cancel-in-progress: true

env:
  RIPGREP_VERSION: 15.1.0

jobs:
  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            crates/agent-desktop/pnpm-lock.yaml
            crates/agent-server/web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          pnpm --dir crates/agent-server/web install --frozen-lockfile
          pnpm --dir crates/agent-desktop install --frozen-lockfile

      - name: Download ripgrep sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path crates/agent-desktop/src-tauri/binaries,dist/rg | Out-Null
          $target = "x86_64-pc-windows-msvc"
          $asset = "ripgrep-${env:RIPGREP_VERSION}-$target.zip"
          $url = "https://github.com/BurntSushi/ripgrep/releases/download/${env:RIPGREP_VERSION}/$asset"
          Invoke-WebRequest -Uri $url -OutFile "dist/$asset"
          Expand-Archive -Path "dist/$asset" -DestinationPath dist/rg
          $source = "dist/rg/ripgrep-${env:RIPGREP_VERSION}-$target/rg.exe"
          $destination = "crates/agent-desktop/src-tauri/binaries/morrow-rg-$target.exe"
          Copy-Item $source $destination
          if (-not (Test-Path $destination)) { throw "ripgrep sidecar was not prepared" }

      - name: Build NSIS installer
        run: pnpm --dir crates/agent-desktop exec tauri build --target x86_64-pc-windows-msvc --bundles nsis --config '{"version":"0.3.2-hotfix.1"}'

      - name: Verify and stage installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($null -eq $installer) { throw "NSIS installer was not produced" }
          $listing = (& 7z l $installer.FullName | Out-String)
          if ($listing -notmatch "morrow-rg.exe") { throw "NSIS installer does not contain morrow-rg.exe" }

          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          $artifactName = "Morrow_0.3.2-hotfix.1_windows-hotfix_0b50f1c_x64-setup.exe"
          $artifactPath = "dist/windows/$artifactName"
          Copy-Item $installer.FullName $artifactPath
          $hash = (Get-FileHash $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifactName" | Out-File "dist/windows/SHA256SUMS.txt" -Encoding ascii

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Morrow-0.3.2-hotfix.1-windows-x64
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 14
